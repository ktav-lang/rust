name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

  msrv:
    name: MSRV (1.70)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Stable cargo (>= 1.84) with `incompatible-rust-versions = fallback`
      # honours `package.rust-version` and prefers transitive versions
      # declaring MSRV <= ours. This picks an entirely 1.70-parseable
      # graph automatically — no per-crate `--precise` pins needed.
      - uses: dtolnay/rust-toolchain@stable

      - name: Generate MSRV-aware lockfile
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
        run: cargo generate-lockfile

      - uses: dtolnay/rust-toolchain@1.70

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --locked
