# Upstreams with nested timeouts and inner tag lists
port: 20082

banned_patterns: [
    .*\.onion:\d+
]

upstreams: [
    {
        host: a.example
        port: 1080
        timeouts: {
            read: 30
            write: 10
        }
    }
    {
        host: b.example
        port: 1080
        weight: 3
        tags: [
            backup
            eu
        ]
    }
]
